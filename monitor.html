<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Campus Apolana — Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" onerror="console.error('Firebase app script failed to load')"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" onerror="console.error('Firebase firestore script failed to load')"></script>
<script>
window._fbDB = null;
window._fbStatus = 'connecting';

function _showMonitorPin() {
  document.getElementById('loadingMsg').style.display='none';
  document.getElementById('pinSection').style.display='flex';
}

// Load from localStorage IMMEDIATELY — no waiting
try {
  const g = localStorage.getItem('campusGrupos3');
  if(g) window._grupos = JSON.parse(g);
  const m = localStorage.getItem('campusMonitores');
  if(m) window._monitoresData = JSON.parse(m);
} catch(e) {}

// Show pin screen RIGHT AWAY regardless of Firebase
document.addEventListener('DOMContentLoaded', _showMonitorPin);
// Also show after 2s max wait regardless
setTimeout(_showMonitorPin, 2000);

function _initMonitorFirebase() {
  if(typeof firebase === 'undefined' || typeof firebase.firestore !== 'function') {
    setTimeout(_initMonitorFirebase, 500);
    return;
  }
  try {
    if(!firebase.apps.length) firebase.initializeApp({
      apiKey: "AIzaSyB_DjjZVcDHVyFIMM1QzI0l-pXIzT8oOc8",
      authDomain: "campus-apolana.firebaseapp.com",
      projectId: "campus-apolana",
      storageBucket: "campus-apolana.firebasestorage.app",
      messagingSenderId: "858270175127",
      appId: "1:858270175127:web:2b83f8408dd8128512fed2"
    });
    window._fbDB = firebase.firestore();
    window._fbStatus = 'connected';
    var cs = document.getElementById('connStatus');
    if(cs) { cs.textContent='🟢 Conectado'; cs.style.color='#00C46A'; }

    // Load grupos from Firebase
    window._fbDB.collection('campus').doc('grupos').get().then(function(snap) {
      if(snap.exists) {
        try {
          var d = JSON.parse(snap.data().data);
          if(d) { window._grupos = d; localStorage.setItem('campusGrupos3', JSON.stringify(d)); }
        } catch(e) {}
      }
      // Load monitores
      return window._fbDB.collection('campus').doc('monitores').get();
    }).then(function(snap2) {
      if(snap2 && snap2.exists) {
        try {
          var p = JSON.parse(snap2.data().data);
          if(p) { window._monitoresData = p; localStorage.setItem('campusMonitores', JSON.stringify(p)); }
        } catch(e) {}
      }
      _showMonitorPin();
    }).catch(function(e) {
      console.error('Firebase load error:', e);
      _showMonitorPin();
    });

  } catch(e) {
    console.error('Firebase init error:', e);
    var cs = document.getElementById('connStatus');
    if(cs) { cs.textContent='🔴 Sin conexión Firebase'; cs.style.color='#FF4D4D'; }
    setTimeout(_initMonitorFirebase, 3000);
  }
}
// Start Firebase in background — don't block pin screen
setTimeout(_initMonitorFirebase, 500);
window.addEventListener('load', function(){ if(!window._fbDB) setTimeout(_initMonitorFirebase, 1000); });
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:#0A0E14;color:#fff;min-height:100vh;display:flex;flex-direction:column}

.top-bar{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#FFB800}
.logo span{color:#fff;font-weight:700}
#connStatus{font-size:.72rem;color:#888}

.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}

/* LOADING */
#loadingMsg{text-align:center;color:#888;font-size:.9rem}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#FFB800;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PIN SECTION */
#pinSection{display:none;flex-direction:column;align-items:center;width:100%;max-width:360px;gap:0}
.pin-icon{font-size:3rem;margin-bottom:20px;text-align:center}
.pin-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.5px;text-align:center;margin-bottom:8px}
.pin-sub{font-size:.85rem;color:#8899AA;text-align:center;margin-bottom:32px}
.pin-input{width:100%;text-align:center;font-size:2rem;letter-spacing:.4rem;font-family:'DM Mono',monospace;font-weight:600;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:18px;color:#fff;outline:none;transition:border-color .2s}
.pin-input:focus{border-color:#FFB800}
.pin-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:.2rem}
.btn-enter{width:100%;margin-top:16px;padding:16px;background:#FFB800;color:#0A0E14;border:none;border-radius:12px;font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s}
.btn-enter:hover{background:#E6A600;transform:translateY(-1px)}
.btn-enter:active{transform:translateY(0)}
.pin-error{color:#FF4D4D;font-size:.82rem;margin-top:10px;text-align:center;display:none}

/* ATTEND SCREEN */
#attendScreen{display:none;width:100%;max-width:560px;padding-bottom:100px}
.attend-header{background:linear-gradient(135deg,#1E2A38,#0F1923);border-radius:14px;padding:18px 20px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08)}
.attend-header h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#FFB800;letter-spacing:-.3px}
.attend-sub{font-size:.78rem;color:#8899AA;margin-top:4px}

.date-nav{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.08);padding:12px 16px;margin-bottom:10px}
.date-nav button{background:rgba(255,255,255,.08);border:none;cursor:pointer;font-size:1rem;color:#FFB800;padding:6px 12px;border-radius:8px;transition:background .15s}
.date-nav button:hover{background:rgba(255,184,0,.15)}
.date-label{flex:1;text-align:center;font-weight:600;font-size:.93rem;color:#fff}
.day-badge{font-size:.7rem;color:#8899AA;font-weight:400}

.week-jumps{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.week-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8899AA;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .2s}
.week-btn:hover,.week-btn.active{background:#FFB800;color:#0A0E14;border-color:#FFB800}

.summary{display:flex;gap:8px;margin-bottom:14px}
.sum-pill{flex:1;border-radius:10px;padding:10px 6px;text-align:center;font-weight:700;font-size:.82rem}
.sum-p{background:rgba(0,196,106,.12);color:#00C46A;border:1px solid rgba(0,196,106,.25)}
.sum-a{background:rgba(255,77,77,.12);color:#FF7070;border:1px solid rgba(255,77,77,.25)}
.sum-t{background:rgba(255,184,0,.08);color:#FFB800;border:1px solid rgba(255,184,0,.2)}

.attend-list{display:flex;flex-direction:column;gap:8px}
.attend-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border-radius:12px;border:1.5px solid rgba(255,255,255,.08);padding:13px 16px;cursor:pointer;transition:all .18s;user-select:none}
.attend-item.present{border-color:#00C46A;background:rgba(0,196,106,.08)}
.attend-item.absent{border-color:#FF4D4D;background:rgba(255,77,77,.08)}
.attend-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
.attend-name{flex:1;font-weight:600;font-size:.95rem}
.attend-info{font-size:.72rem;color:#8899AA;margin-top:2px}
.attend-alergia{display:inline-block;font-size:.68rem;color:#FFB800;background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.25);border-radius:4px;padding:2px 7px;margin-top:3px}
.attend-status{font-size:1.3rem;transition:transform .15s;flex-shrink:0}
.attend-item.present .attend-status{transform:scale(1.15)}

.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,20,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);padding:14px 20px;display:flex;align-items:center;gap:10px;z-index:100}
.btn-save{flex:1;padding:14px;background:#00C46A;color:#fff;border:none;border-radius:10px;font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s}
.btn-save:hover{background:#00A558}
.saved-msg{font-size:.78rem;color:#00C46A;font-weight:600;display:none;white-space:nowrap}
.btn-hist{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:.8rem;font-family:'Instrument Sans',sans-serif;white-space:nowrap;transition:all .2s}
.btn-hist:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-exit{background:transparent;border:1px solid rgba(255,255,255,.1);color:#666;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:.8rem;font-family:'Instrument Sans',sans-serif;white-space:nowrap}

.hist-section{margin-top:20px;padding-bottom:20px}
.hist-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:10px;color:#aaa}
.hist-day{background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.08);padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;font-size:.82rem}
.hist-date{font-weight:600;flex:1;color:#fff}
.hist-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.1);flex:2;overflow:hidden}
.hist-fill{height:100%;background:#00C46A;border-radius:3px}
.hist-nums{font-size:.76rem;color:#888;min-width:70px;text-align:right}
</style>
</head>

<script>
// ── CAMPUS WEEKS ──
function showToast(msg,type='success',duration=2500){const e=document.getElementById('fbToast');if(e)e.remove();const c={success:{bg:'#EDFBF3',color:'#1A7A40',border:'#A8E6C0'},error:{bg:'#FFE0E0',color:'#C00',border:'#FFC0C0'},warn:{bg:'rgba(255,248,230,.95)',color:'#856404',border:'#FFE69C'},info:{bg:'rgba(238,244,255,.95)',color:'#0052CC',border:'#C7D9FF'}}[type]||{bg:'#EDFBF3',color:'#1A7A40',border:'#A8E6C0'};const t=document.createElement('div');t.id='fbToast';t.style.cssText=`position:fixed;bottom:84px;right:16px;z-index:99999;background:${c.bg};color:${c.color};border:1px solid ${c.border};border-radius:10px;padding:11px 16px;font-family:'Instrument Sans',sans-serif;font-size:.83rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:280px`;t.innerHTML=msg;document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},duration);}

const CAMPUS_WEEKS=[
  {label:'Semana 1',start:'2026-06-29',end:'2026-07-03'},
  {label:'Semana 2',start:'2026-07-06',end:'2026-07-10'},
  {label:'Semana 3',start:'2026-07-13',end:'2026-07-17'},
  {label:'Semana 4',start:'2026-07-20',end:'2026-07-24'},
  {label:'Semana 5',start:'2026-07-27',end:'2026-07-31'},
];
const GROUP_COLORS=[
  {name:'Rojo',bg:'#E74C3C'},{name:'Verde',bg:'#27AE60'},
  {name:'Azul',bg:'#2980B9'},{name:'Amarillo',bg:'#F39C12'},
];
function getGroupColor(gi){if(gi<0)return '#6B7AAD';return GROUP_COLORS[gi%GROUP_COLORS.length].bg;}
function getGroupName(gi){if(gi<0)return '';return GROUP_COLORS[gi%GROUP_COLORS.length].name+' '+(Math.floor(gi/GROUP_COLORS.length)+1);}

function getWeekDays(wi){
  const w=CAMPUS_WEEKS[wi];if(!w)return[];
  const days=[],d=new Date(w.start+'T12:00:00'),end=new Date(w.end+'T12:00:00');
  while(d<=end){if(d.getDay()>=1&&d.getDay()<=5)days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}
function getAllDays(){const d=[];CAMPUS_WEEKS.forEach((_,wi)=>getWeekDays(wi).forEach(day=>d.push(day)));return d;}
function dateStr(d){return d.toISOString().split('T')[0];}
function formatDay(d){
  const D=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return D[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()];
}
function getWeekIdx(di){let c=0;for(let wi=0;wi<CAMPUS_WEEKS.length;wi++){const d=getWeekDays(wi);if(di<c+d.length)return wi;c+=d.length;}return CAMPUS_WEEKS.length-1;}
function currentCampusDay(){
  const all=getAllDays(),today=new Date();today.setHours(12,0,0,0);
  for(let i=0;i<all.length;i++)if(dateStr(all[i])===dateStr(today))return i;
  for(let i=0;i<all.length;i++)if(all[i]>=today)return i;
  return all.length-1;
}

// ── STATE ──
let monitorGroup=null, dayIdx=0;

function makeCode(semana,gi){
  const wi=CAMPUS_WEEKS.findIndex(w=>w.label===semana);
  const s=wi>=0?'S'+(wi+1):'S0';
  const c=GROUP_COLORS[gi%GROUP_COLORS.length].name.substring(0,2).toUpperCase();
  const num=Math.floor(gi/GROUP_COLORS.length)+1;
  return s+c+num;
}


// ══════════════════════════════════════════════
// SPECIAL MODES: MATINERA & COMEDOR
// ══════════════════════════════════════════════
function enterSpecialMode(mode) {
  var g = window._grupos || {};
  if(!Object.keys(g).length) {
    try { var ls = localStorage.getItem('campusGrupos3'); if(ls) window._grupos = JSON.parse(ls); g = window._grupos||{}; } catch(e) {}
  }
  if(!Object.keys(g).length) {
    setTimeout(function(){ enterSpecialMode(mode); }, 800);
    return;
  }

  var di = currentCampusDay();
  var wi = getWeekIdx ? getWeekIdx(di) : 0;
  var semana = CAMPUS_WEEKS[wi] ? CAMPUS_WEEKS[wi].label : Object.keys(g)[0];

  var kids = buildSpecialKids(mode, semana, g);

  if(!kids.length) {
    alert('No hay niños con ' + mode + ' en ' + semana + '. Comprueba que los datos están enriquecidos.');
    return;
  }

  monitorGroup = {
    turno: semana,
    groupIdx: -1,
    kids: kids,
    code: mode.toUpperCase(),
    monitorNombre: mode === 'matinera' ? 'Matinera' : 'Comedor',
    isSpecial: mode
  };

  dayIdx = di;
  document.getElementById('pinSection').style.display = 'none';
  document.getElementById('attendScreen').style.display = 'block';

  document.getElementById('monTitle').textContent = (mode === 'matinera' ? '🌅 Matinera' : '🍽️ Comedor') + ' · ' + semana;
  document.getElementById('monSub').textContent = kids.length + ' niños';

  // Week jump buttons
  var c = 0;
  var jumpsHtml = '';
  CAMPUS_WEEKS.forEach(function(w, wi2) {
    var wDays = getWeekDays(wi2);
    var isCur = wi2 === wi;
    jumpsHtml += '<button class="week-btn' + (isCur ? ' active' : '') + '" data-startdi="' + c + '" data-mode="' + mode + '" onclick="specialJumpWeek(this)">' + w.label + '</button>';
    c += wDays.length;
  });
  document.getElementById('weekJumps').innerHTML = jumpsHtml;

  renderList();
}

function specialJumpWeek(btn) {
  var startDi = parseInt(btn.dataset.startdi);
  var mode = btn.dataset.mode;
  var wi = getWeekIdx ? getWeekIdx(startDi) : 0;
  var semana = CAMPUS_WEEKS[wi] ? CAMPUS_WEEKS[wi].label : null;
  if(!semana) return;
  var g = window._grupos || {};
  var kids = buildSpecialKids(mode, semana, g);
  monitorGroup.turno = semana;
  monitorGroup.kids = kids;
  monitorGroup.isSpecial = mode;
  dayIdx = startDi;
  document.getElementById('monTitle').textContent = (mode === 'matinera' ? '🌅 Matinera' : '🍽️ Comedor') + ' · ' + semana;
  document.getElementById('monSub').textContent = kids.length + ' niños';
  document.querySelectorAll('#weekJumps .week-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderList();
}

function buildSpecialKids(mode, semana, g) {
  var kids = [];
  var seen = new Set();
  if(!g[semana]) return kids;
  g[semana].forEach(function(grupo) {
    grupo.forEach(function(kid) {
      var name = (kid.nombre||'') + ' ' + (kid.apellidos||'');
      if(seen.has(name)) return;
      var val = kid[mode];
      var has = val === true || val === 'true' || String(val).toLowerCase() === 'sí' || String(val).toLowerCase() === 'si' || val === 1 || val === '1';
      if(has) { seen.add(name); kids.push(kid); }
    });
  });
  kids.sort(function(a,b){ return ((a.nombre||'')+' '+(a.apellidos||'')).localeCompare((b.nombre||'')+' '+(b.apellidos||'')); });
  return kids;
}

function enterPin(){
  const pin=document.getElementById('pinInput').value.trim().toUpperCase();
  if(!pin) return;

  // Si Firebase está cargando y no tenemos datos de monitores todavía, esperar y reintentar
  if(window._fbStatus==='connecting' && !window._monitoresData && !localStorage.getItem('campusMonitores')) {
    var btn = document.querySelector('.btn-enter');
    if(btn) { btn.textContent='⏳ Conectando...'; btn.disabled=true; }
    setTimeout(function(){
      if(btn) { btn.textContent='Entrar →'; btn.disabled=false; }
      enterPin();
    }, 1500);
    return;
  }

  let grupos=window._grupos||{};
  // Also try localStorage
  if(!Object.keys(grupos).length){try{const g=localStorage.getItem('campusGrupos3');if(g)grupos=JSON.parse(g);}catch(e){}}

  // Also try monitoresData from localStorage if not in memory
  let monDataRaw = window._monitoresData;
  if(!monDataRaw) { try { const m=localStorage.getItem('campusMonitores'); if(m) monDataRaw=JSON.parse(m); } catch(e){} }

  let found=null;

  // Check named monitor codes first
  const monData=monDataRaw;
  if(monData){
    const mon=monData.monitores.find(m=>m.codigo===pin);
    if(mon){
      const asig=monData.asignaciones||{};
      Object.keys(asig).forEach(semana=>{
        Object.entries(asig[semana]).forEach(([gi,codigo])=>{
          if(codigo===pin&&grupos[semana]&&grupos[semana][parseInt(gi)]){
            found={turno:semana,groupIdx:parseInt(gi),kids:grupos[semana][parseInt(gi)],code:pin,monitorNombre:mon.nombre};
          }
        });
      });
    }
  }

  // Fallback: old group code
  if(!found){
    Object.keys(grupos).forEach(t=>{
      grupos[t].forEach((g,gi)=>{if(makeCode(t,gi)===pin)found={turno:t,groupIdx:gi,kids:g,code:pin};});
    });
  }

  // Special codes
  if(pin === 'MATINERA') { enterSpecialMode('matinera'); return; }
  if(pin === 'COMEDOR') { enterSpecialMode('comedor'); return; }

  if(!found){document.getElementById('pinError').style.display='block';return;}
  monitorGroup=found;
  dayIdx=currentCampusDay();
  document.getElementById('pinSection').style.display='none';
  document.getElementById('attendScreen').style.display='block';

  const ages=found.kids.map(k=>k.edad).filter(Boolean);
  const greeting=found.monitorNombre?'Hola, '+found.monitorNombre:'Grupo '+(found.groupIdx+1);
  document.getElementById('monTitle').textContent=greeting+' · '+found.turno;
  document.getElementById('monSub').textContent=found.kids.length+' niños · '+(ages.length?Math.min(...ages)+'-'+Math.max(...ages)+' años':'?')+' · '+getGroupName(found.groupIdx);

  // Week jump buttons
  let c=0;
  document.getElementById('weekJumps').innerHTML=CAMPUS_WEEKS.map((w,wi)=>{
    const fi=c;c+=getWeekDays(wi).length;
    return'<button class="week-btn" onclick="jumpWeek('+fi+')" id="wb'+wi+'">'+w.label+'</button>';
  }).join('');

  loadMonitorSchedule(found.turno,found.groupIdx);
  renderList();
}

function exitMonitor(){
  document.getElementById('attendScreen').style.display='none';
  document.getElementById('pinSection').style.display='flex';
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').style.display='none';
  monitorGroup=null;
}

function changeDay(d){
  const all=getAllDays();
  dayIdx=Math.max(0,Math.min(dayIdx+d,all.length-1));
  renderList();
  document.getElementById('histSection').style.display='none';
}
function jumpWeek(fi){dayIdx=fi;renderList();document.getElementById('histSection').style.display='none';}

function attendKey(code,date){return'att_'+code+'_'+date;}

async function loadSaved(code,date){
  const key=attendKey(code,date);
  if(window._fbDB){
    try{const s=await window._fbDB.collection('attendance').doc(key).get();if(s.exists)return JSON.parse(s.data().data);}catch(e){}
  }
  try{const d=localStorage.getItem(key);return d?JSON.parse(d):{};}catch(e){return{};}
}

async function renderList(){
  if(!monitorGroup)return;
  const all=getAllDays();
  const di=Math.max(0,Math.min(dayIdx,all.length-1));
  const day=all[di];
  const wi=getWeekIdx(di);
  document.getElementById('dateLabel').textContent=formatDay(day);
  document.getElementById('dayBadge').textContent=CAMPUS_WEEKS[wi].label+' · '+day.toLocaleDateString('es-ES');

  // Update active week button
  document.querySelectorAll('.week-btn').forEach((b,i)=>b.classList.toggle('active',i===wi));

  const saved=await loadSaved(monitorGroup.code,dateStr(day));
  const color=getGroupColor(monitorGroup.groupIdx);
  const list=document.getElementById('attendList');
  list.innerHTML='';

  // Allergy alert banner
  const ALERGIA_NEG2 = new Set(['no','no tiene','no tiene alergias','ninguna','ninguno','ninguna conocida','nada','no conocida','no tiene ninguna','ninguna alergia','no alergia','sin alergias','no tiene alergia','ninguna conocida hasta el momento','no conocidas']);
  function cleanA(v){ if(!v) return ''; const vl=v.trim().toLowerCase().replace(/\.+$/,''); if(ALERGIA_NEG2.has(vl)||/^no\b/.test(vl)||/^ninguna?\b/.test(vl)) return ''; return v.trim(); }
  const kidsConAlergia = monitorGroup.kids.filter(k=>cleanA(k.alergias));
  const alertBanner = document.getElementById('alergiaBanner');
  if(alertBanner){
    if(kidsConAlergia.length){
      alertBanner.style.display='block';
      alertBanner.innerHTML='⚠️ <strong>'+kidsConAlergia.length+' niño'+(kidsConAlergia.length>1?'s':'')+' con alergia en este grupo:</strong> '+
        kidsConAlergia.map(k=>'<strong>'+(k.apellidos?k.nombre+' '+k.apellidos:k.nombre)+'</strong>: '+cleanA(k.alergias)).join(' · ');
    } else {
      alertBanner.style.display='none';
    }
  }

  const ALERGIA_NEG = new Set(['no','no tiene','no tiene alergias','ninguna','ninguno','ninguna conocida','nada','no conocida','no tiene ninguna','ninguna alergia','no alergia','sin alergias','no tiene alergia','ninguna conocida hasta el momento','no conocidas']);
  function cleanAlergia(v){ if(!v) return ''; const vl=v.trim().toLowerCase().replace(/\.+$/,''); if(ALERGIA_NEG.has(vl)||/^no\b/.test(vl)||/^ninguna?\b/.test(vl)) return ''; return v.trim(); }

  monitorGroup.kids.forEach(function(kid) {
    var name = (kid.apellidos ? kid.nombre+' '+kid.apellidos : kid.nombre);
    var kidData = saved[name] || saved[kid.nombre] || {};
    var status = typeof kidData === 'string' ? kidData : (kidData.status || 'pending');
    var arrived = typeof kidData === 'object' ? !!kidData.arrived : status === 'present';
    var picked = typeof kidData === 'object' ? !!kidData.picked : false;
    var aComedor = typeof kidData === 'object' ? !!kidData.aComedor : false;
    var dayObs = typeof kidData === 'object' ? (kidData.obs || '') : '';

    var div = document.createElement('div');
    var stateClass = status === 'absent' ? ' absent' : (arrived || status === 'present') ? ' arrived' : '';
    div.className = 'attend-item' + stateClass;
    div.dataset.nombre = name;
    div.dataset.status = status;
    div.dataset.arrived = arrived ? '1' : '0';
    div.dataset.picked = picked ? '1' : '0';
    div.dataset.acomedor = aComedor ? '1' : '0';
    div.dataset.obs = dayObs;

    var initials = name.split(' ').map(function(w){ return w[0]; }).join('').substring(0,2).toUpperCase();
    var alergias = cleanAlergia(kid.alergias);
    var otros = (kid.otros||'').trim();

    var avatar = document.createElement('div');
    avatar.className = 'attend-avatar';
    avatar.style.background = color;
    avatar.textContent = initials;

    var info = document.createElement('div');
    info.style.cssText = 'flex:1;min-width:0';

    var nameEl = document.createElement('div');
    nameEl.className = 'attend-name';
    nameEl.textContent = name;

    var tagsEl = document.createElement('div');
    tagsEl.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center';
    if(kid.comedor) tagsEl.innerHTML += '<span style="font-size:.68rem;color:#FFB800;background:rgba(255,184,0,.12);border:1px solid rgba(255,184,0,.3);border-radius:4px;padding:2px 7px">🍽️ Comedor</span>';
    if(kid.matinera) tagsEl.innerHTML += '<span style="font-size:.68rem;color:#aaa;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:2px 7px">🌅 Matinera</span>';
    if(alergias) tagsEl.innerHTML += '<span style="font-size:.68rem;color:#FF4D4D;background:rgba(255,77,77,.12);border:1px solid rgba(255,77,77,.3);border-radius:4px;padding:2px 7px;font-weight:600">⚠️ ' + alergias + '</span>';

    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;margin-top:8px;flex-wrap:wrap';

    function mkBtn(text, activeColor, isActive) {
      var b = document.createElement('button');
      b.style.cssText = 'background:' + (isActive ? activeColor : 'none') + ';border:1px solid ' + (isActive ? activeColor : 'rgba(255,255,255,.2)') + ';color:' + (isActive ? '#fff' : '#8899AA') + ';border-radius:7px;padding:5px 10px;cursor:pointer;font-size:.75rem;font-weight:600;white-space:nowrap';
      b.textContent = text;
      return b;
    }

    var arrivedBtn = mkBtn(arrived ? '✅ Llegó' : '☐ Llegó', '#3B82F6', arrived);
    var pickedBtn = mkBtn(picked ? '🏠 Recogido' : '☐ Recogido', '#8B5CF6', picked);
    var absBtn = mkBtn(status === 'absent' ? '❌ Ausente' : '☐ Ausente', '#EF4444', status === 'absent');
    var obsBtn = document.createElement('button');
    obsBtn.className = 'btn-obs' + (dayObs ? ' has-obs' : '');
    obsBtn.textContent = dayObs ? '📝 ' + dayObs.substring(0,18) + (dayObs.length > 18 ? '...' : '') : '+ Nota';

    arrivedBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var a = div.dataset.arrived !== '1';
      div.dataset.arrived = a ? '1' : '0';
      if(a) { div.dataset.status = 'present'; div.classList.remove('absent'); div.classList.add('arrived'); }
      arrivedBtn.style.background = a ? '#3B82F6' : 'none';
      arrivedBtn.style.borderColor = a ? '#3B82F6' : 'rgba(255,255,255,.2)';
      arrivedBtn.style.color = a ? '#fff' : '#8899AA';
      arrivedBtn.textContent = a ? '✅ Llegó' : '☐ Llegó';
      updateCounts(); autoSave();
    });
    pickedBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var p = div.dataset.picked !== '1';
      div.dataset.picked = p ? '1' : '0';
      pickedBtn.style.background = p ? '#8B5CF6' : 'none';
      pickedBtn.style.borderColor = p ? '#8B5CF6' : 'rgba(255,255,255,.2)';
      pickedBtn.style.color = p ? '#fff' : '#8899AA';
      pickedBtn.textContent = p ? '🏠 Recogido' : '☐ Recogido';
      updateCounts(); autoSave();
    });
    absBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var ab = div.dataset.status !== 'absent';
      div.dataset.status = ab ? 'absent' : 'pending';
      div.dataset.arrived = '0';
      div.classList.toggle('absent', ab);
      div.classList.remove('arrived');
      absBtn.style.background = ab ? '#EF4444' : 'none';
      absBtn.style.borderColor = ab ? '#EF4444' : 'rgba(255,255,255,.2)';
      absBtn.style.color = ab ? '#fff' : '#8899AA';
      absBtn.textContent = ab ? '❌ Ausente' : '☐ Ausente';
      arrivedBtn.style.background = 'none'; arrivedBtn.style.borderColor = 'rgba(255,255,255,.2)'; arrivedBtn.style.color = '#8899AA'; arrivedBtn.textContent = '☐ Llegó';
      updateCounts(); autoSave();
    });
    obsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var cur = div.dataset.obs || '';
      var nw = prompt('Nota para ' + name + ':', cur);
      if(nw === null) return;
      nw = nw.trim();
      div.dataset.obs = nw;
      obsBtn.className = 'btn-obs' + (nw ? ' has-obs' : '');
      obsBtn.textContent = nw ? '📝 ' + nw.substring(0,18) + (nw.length>18?'...':'') : '+ Nota';
      autoSave();
    });

    btnRow.appendChild(arrivedBtn);
    btnRow.appendChild(pickedBtn);
    btnRow.appendChild(absBtn);

    if(kid.comedor) {
      var comedorBtn = mkBtn(aComedor ? '🍽️ A comedor' : '☐ A comedor', '#10B981', aComedor);
      comedorBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var c = div.dataset.acomedor !== '1';
        div.dataset.acomedor = c ? '1' : '0';
        comedorBtn.style.background = c ? '#10B981' : 'none';
        comedorBtn.style.borderColor = c ? '#10B981' : 'rgba(255,255,255,.2)';
        comedorBtn.style.color = c ? '#fff' : '#8899AA';
        comedorBtn.textContent = c ? '🍽️ A comedor' : '☐ A comedor';
        autoSave();
      });
      btnRow.appendChild(comedorBtn);
    }

    btnRow.appendChild(obsBtn);

    if(otros) {
      var otrosEl = document.createElement('div');
      otrosEl.style.cssText = 'font-size:.72rem;color:#8899AA;margin-top:4px;padding:4px 8px;background:rgba(255,255,255,.04);border-radius:6px;border-left:2px solid rgba(107,122,173,.4)';
      otrosEl.textContent = '📝 ' + otros;
      info.appendChild(nameEl); info.appendChild(tagsEl); info.appendChild(otrosEl); info.appendChild(btnRow);
    } else {
      info.appendChild(nameEl); info.appendChild(tagsEl); info.appendChild(btnRow);
    }

    div.appendChild(avatar);
    div.appendChild(info);
    list.appendChild(div);
  });
  updateCounts();
}

var _autoSaveTimer = null;
function autoSave() {
  if(_autoSaveTimer) clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveAttend, 1500);
}

function updateCounts(){
  var items = document.querySelectorAll('#attendList .attend-item');
  var arrived = 0, picked = 0, absent = 0;
  items.forEach(function(el){
    if(el.dataset.status === 'absent') absent++;
    else if(el.dataset.arrived === '1') arrived++;
    if(el.dataset.picked === '1') picked++;
  });
  var cP = document.getElementById('cP');
  var cA = document.getElementById('cA');
  var cT = document.getElementById('cT');
  if(cP) cP.textContent = arrived + (picked ? ' (' + picked + ' 🏠)' : '');
  if(cA) cA.textContent = absent;
  if(cT) cT.textContent = items.length;
}

async function saveAttend(){
  if(!monitorGroup)return;
  const all=getAllDays(),di=Math.max(0,Math.min(dayIdx,all.length-1));
  const day=all[di];
  const data={};
  document.querySelectorAll('#attendList .attend-item').forEach(function(el){
    if(!el.dataset.nombre) return;
    data[el.dataset.nombre] = {
      status: el.dataset.status || 'pending',
      arrived: el.dataset.arrived === '1',
      picked: el.dataset.picked === '1',
      aComedor: el.dataset.acomedor === '1',
      obs: el.dataset.obs || ''
    };
  });
  const key=attendKey(monitorGroup.code,dateStr(day));
  try{localStorage.setItem(key,JSON.stringify(data));}catch(e){}
  if(window._fbDB){try{await window._fbDB.collection('attendance').doc(key).set({data:JSON.stringify(data),updated:new Date()});}catch(e){}}
  const msg=document.getElementById('savedMsg');msg.style.display='block';setTimeout(()=>msg.style.display='none',2000);
  if(window._fbDB) showToast('🔥 Guardado en Firebase ✅','success');
  else showToast('💾 Guardado localmente','info');
}

async function toggleHist(){
  const sec=document.getElementById('histSection');
  if(sec.style.display==='block'){sec.style.display='none';return;}
  sec.style.display='block';
  const hl=document.getElementById('histList');
  hl.innerHTML='<p style="color:#888;font-size:.83rem">Cargando...</p>';
  let entries=[];
  const prefix='att_'+monitorGroup.code+'_';

  // Primary: localStorage (instant, no permissions needed)
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(prefix)){
      const ds=k.replace(prefix,'');
      const vals=Object.values(JSON.parse(localStorage.getItem(k)||'{}'));
      entries.push({ds,p:vals.filter(v=>v==='present').length,t:monitorGroup.kids.length});
    }
  }

  // Secondary: try to get specific docs from Firebase (one by one for known dates)
  if(window._fbDB && entries.length===0){
    try{
      // Get the campus weeks days and check each one
      const allDays=getAllDays();
      const checks=allDays.map(d=>{
        const ds=dateStr(d);
        const key='att_'+monitorGroup.code+'_'+ds;
        return window._fbDB.collection('attendance').doc(key).get().then(snap=>{
          if(snap.exists){
            try{localStorage.setItem(key,JSON.stringify(JSON.parse(snap.data().data)));}catch(e){}
            const vals=Object.values(JSON.parse(snap.data().data||'{}'));
            if(vals.length>0) entries.push({ds,p:vals.filter(v=>v==='present').length,t:monitorGroup.kids.length});
          }
        }).catch(()=>{});
      });
      await Promise.all(checks);
    }catch(e){console.warn('Firebase hist error:',e);}
  }

  hl.innerHTML='';
  if(!entries.length){hl.innerHTML='<p style="color:#888;font-size:.83rem">Sin registros aún. Pasa lista y guarda para ver el historial.</p>';return;}
  entries.sort((a,b)=>b.ds.localeCompare(a.ds)).forEach(e=>{
    const pct=Math.round(e.p/e.t*100);
    const[y,m,d]=e.ds.split('-');
    const div=document.createElement('div');div.className='hist-day';
    div.innerHTML='<span class="hist-date">'+d+'/'+m+'/'+y+'</span><div class="hist-bar"><div class="hist-fill" style="width:'+pct+'%"></div></div><span class="hist-nums">'+e.p+'/'+e.t+' ('+pct+'%)</span>';
    hl.appendChild(div);
  });
}

const DIAS_MON=['Lunes','Martes','Miércoles','Jueves','Viernes'];

function loadMonitorSchedule(semana, gi) {
  const key = semana+'__'+gi;
  window._currentScheduleKey = key;
  // Try localStorage first
  try {
    const d = localStorage.getItem('campusMonitores');
    if(d) { const p=JSON.parse(d); window._horarios = p.horarios||{}; }
  } catch(e) {}
}

function toggleSchedule() {
  const sec = document.getElementById('scheduleSection');
  if(sec.style.display==='block'){sec.style.display='none';return;}
  sec.style.display='block';
  renderSchedule();
}

function renderSchedule() {
  const key = window._currentScheduleKey;
  const horarios = window._horarios||{};
  const sc = document.getElementById('scheduleContent');
  if(!key||!horarios[key]||!horarios[key].length){
    sc.innerHTML='<p style="color:#888;font-size:.83rem;padding:8px 0">Horario no disponible todavía. El coordinador lo publicará próximamente.</p>';
    return;
  }
  const rows = horarios[key];
  sc.innerHTML = `<div style="overflow-x:auto;margin-top:8px">
    <table style="width:100%;border-collapse:collapse;font-size:.78rem;min-width:400px">
      <thead>
        <tr style="background:rgba(255,255,255,.08)">
          <th style="padding:8px 10px;text-align:left;color:#FFB800;white-space:nowrap">Hora</th>
          ${DIAS_MON.map(d=>`<th style="padding:8px 6px;color:#aaa;text-align:center">${d}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${rows.map(row=>`
          <tr style="border-bottom:1px solid rgba(255,255,255,.06)">
            <td style="padding:8px 10px;color:#FFB800;font-size:.72rem;white-space:nowrap;font-family:'DM Mono',monospace">${row.franja||''}</td>
            ${DIAS_MON.map(d=>{
              const act=(row.dias&&row.dias[d])||'';
              return`<td style="padding:6px;text-align:center;color:${act?'#fff':'#444'}">${act||'—'}</td>`;
            }).join('')}
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}
</script>
